<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>色 — shiki</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400&family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #f0ebe4;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Noto Sans JP', sans-serif;
    }

    .app {
      width: 480px;
      background: #f7f3ee;
      border-radius: 6px;
      border: 0.5px solid rgba(0,0,0,0.1);
      overflow: hidden;
    }

    .strip {
      height: 3px;
      width: 100%;
      transition: background 0.55s cubic-bezier(0.4,0,0.2,1);
    }

    .topbar {
      padding: 20px 28px 0;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }

    .app-title {
      font-family: 'Noto Serif JP', serif;
      font-weight: 300;
      font-size: 17px;
      color: #2C2C2A;
      letter-spacing: 0.12em;
    }

    .counter {
      font-size: 11px;
      color: #888780;
      letter-spacing: 0.1em;
    }

    .stage {
      padding: 24px 28px 0;
      position: relative;
    }

    .kamon {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 52px;
      height: 52px;
      opacity: 0.18;
      pointer-events: none;
    }

    .slide {
      width: 100%;
      height: 340px;
      border-radius: 4px;
      display: flex;
      align-items: flex-end;
      padding: 24px;
      transition: background 0.55s cubic-bezier(0.4,0,0.2,1);
    }

    .slide-label {
      font-family: 'Noto Serif JP', serif;
      font-weight: 300;
      font-size: 14px;
      letter-spacing: 0.18em;
      transition: color 0.4s;
    }

    .slide-sublabel {
      font-size: 10px;
      letter-spacing: 0.22em;
      margin-top: 5px;
      opacity: 0.7;
      transition: color 0.4s;
    }

    .controls {
      padding: 20px 28px 26px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .nav-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 0.5px solid #B4B2A9;
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
      flex-shrink: 0;
    }

    .nav-btn:hover { background: #e8e3dc; }

    .nav-btn svg {
      width: 14px;
      height: 14px;
      fill: none;
      stroke: #5F5E5A;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .dots {
      display: flex;
      gap: 8px;
      flex: 1;
      justify-content: center;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #B4B2A9;
      cursor: pointer;
      transition: background 0.3s, transform 0.3s;
      border: none;
    }

    .dot.active {
      background: #5F5E5A;
      transform: scale(1.35);
    }

    .footer-rule {
      height: 0.5px;
      background: rgba(0,0,0,0.08);
      margin: 0 28px;
    }

    .footer {
      padding: 12px 28px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .footer-text {
      font-size: 10px;
      color: #B4B2A9;
      letter-spacing: 0.14em;
    }
  </style>
</head>
<body>

  <div style="padding: 14px 24px; font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.18em;">
  <a href="works.html" style="color: #888780; text-decoration: none;">← back</a>
</div>

<div class="app">
  <div class="strip" id="strip"></div>

  <div class="topbar">
    <span class="app-title">色 — shiki</span>
    <span class="counter" id="counter">01 / 05</span>
  </div>

  <div class="stage">
    <svg class="kamon" id="kamon" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"></svg>
    <div class="slide" id="slide">
      <div>
        <div class="slide-label" id="label"></div>
        <div class="slide-sublabel" id="sublabel"></div>
      </div>
    </div>
  </div>

  <div class="controls">
    <button class="nav-btn" id="prev" aria-label="Previous">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <div class="dots" id="dots"></div>
    <button class="nav-btn" id="next" aria-label="Next">
      <svg viewBox="0 0 24 24"><polyline points="9 6 15 12 9 18"/></svg>
    </button>
  </div>

  <div class="footer-rule"></div>
  <div class="footer">
    <span class="footer-text">日本の伝統色</span>
    <span class="footer-text">traditional japanese colors</span>
  </div>
</div>

<script>
  if (window !== window.top) {
    document.querySelector('.back-col').style.display = 'none';
  }
  const slides = [
    { bg: "#EDCFCF", strip: "#D4A0A0", label: "桜 — sakura", sublabel: "cherry blossom pink", textColor: "#712B13" },
    { bg: "#C8D8C0", strip: "#7A9E70", label: "抹茶 — matcha", sublabel: "tea ceremony green",  textColor: "#27500A" },
    { bg: "#B8C4D8", strip: "#5A6E8A", label: "藍 — ai",      sublabel: "indigo blue",          textColor: "#0C447C" },
    { bg: "#E8C4A0", strip: "#C07840", label: "柿 — kaki",    sublabel: "persimmon orange",      textColor: "#633806" },
    { bg: "#3C3C3A", strip: "#2C2C2A", label: "墨 — sumi",    sublabel: "ink black",             textColor: "#D3D1C7" }
  ];

  let current = 0;

  const slideEl   = document.getElementById("slide");
  const labelEl   = document.getElementById("label");
  const sublabelEl= document.getElementById("sublabel");
  const counterEl = document.getElementById("counter");
  const dotsEl    = document.getElementById("dots");
  const stripEl   = document.getElementById("strip");
  const kamonEl   = document.getElementById("kamon");

  slides.forEach((_, i) => {
    const d = document.createElement("button");
    d.className = "dot" + (i === 0 ? " active" : "");
    d.setAttribute("aria-label", "Go to slide " + (i + 1));
    d.onclick = () => go(i);
    dotsEl.appendChild(d);
  });

  function kamonSVG(color) {
    return `
      <circle cx="50" cy="50" r="44" stroke="${color}" stroke-width="1.5" fill="none"/>
      <circle cx="50" cy="50" r="32" stroke="${color}" stroke-width="1" fill="none"/>
      <line x1="50" y1="6"  x2="50" y2="94" stroke="${color}" stroke-width="1"/>
      <line x1="6"  y1="50" x2="94" y2="50" stroke="${color}" stroke-width="1"/>
      <line x1="18" y1="18" x2="82" y2="82" stroke="${color}" stroke-width="0.8"/>
      <line x1="82" y1="18" x2="18" y2="82" stroke="${color}" stroke-width="0.8"/>
      <circle cx="50" cy="50" r="5" fill="${color}"/>
    `;
  }

  function go(n) {
    current = (n + slides.length) % slides.length;
    const s = slides[current];

    slideEl.style.background   = s.bg;
    stripEl.style.background   = s.strip;
    labelEl.textContent        = s.label;
    labelEl.style.color        = s.textColor;
    sublabelEl.textContent     = s.sublabel;
    sublabelEl.style.color     = s.textColor;
    counterEl.textContent      = String(current + 1).padStart(2, "0") + " / 05";
    kamonEl.innerHTML          = kamonSVG(s.textColor);

    document.querySelectorAll(".dot").forEach((d, i) => {
      d.classList.toggle("active", i === current);
    });
  }

  document.getElementById("prev").onclick = () => go(current - 1);
  document.getElementById("next").onclick = () => go(current + 1);

  document.addEventListener("keydown", e => {
    if (e.key === "ArrowLeft")  go(current - 1);
    if (e.key === "ArrowRight") go(current + 1);
  });

  go(0);
</script>

</body>
</html>
